<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resume Builder</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
</head>

<body>

<h1>Resume Builder</h1>

<div class="container">

<!-- FORM -->
<div class="form">

<input id="name" placeholder="Name">
<input id="title" placeholder="Job Title">
<textarea id="about" placeholder="About"></textarea>
<input id="skills" placeholder="Skills (comma separated)">

<input type="file" id="photo" multiple>

<h3>Templates</h3>
<button onclick="setTemplate(1)">1</button>
<button onclick="setTemplate(2)">2</button>
<button onclick="setTemplate(3)">3</button>
<button onclick="setTemplate(4)">4</button>
<button onclick="setTemplate(5)">5</button>

<br><br>
<button onclick="saveData()">Save</button>
<button onclick="loadData()">Load</button>
<button onclick="downloadPDF()">PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview template1" id="resume">

<div id="pimg"></div>

<h2 id="pname">Your Name</h2>
<p id="ptitle">Title</p>

<div class="section" draggable="true">
<h3>About</h3>
<p id="pabout"></p>
</div>

<div class="section" draggable="true">
<h3>Skills</h3>
<div id="pskills"></div>
</div>

</div>

</div>

<script>

// live update
function link(i,o){
document.getElementById(i).addEventListener("input",function(){
document.getElementById(o).innerText=this.value;
});
}

link("name","pname");
link("title","ptitle");
link("about","pabout");

// skills
skills.oninput=function(){
let arr=this.value.split(",");
let html="";
arr.forEach(s=>{
if(s.trim()!=""){
html+="<span class='skill'>"+s+"</span>";
}
});
pskills.innerHTML=html;
}

// photo (2 images)
photo.onchange=function(){
let files=this.files;
let html="";
for(let i=0;i<files.length && i<2;i++){
let reader=new FileReader();
reader.onload=function(e){
html+="<img src='"+e.target.result+"'>";
pimg.innerHTML=html;
}
reader.readAsDataURL(files[i]);
}
}

// template switch
function setTemplate(n){
resume.className="preview";
resume.classList.add("template"+n);
}

// save
function saveData(){
localStorage.setItem("name",name.value);
localStorage.setItem("title",title.value);
localStorage.setItem("about",about.value);
localStorage.setItem("skills",skills.value);
alert("Saved");
}

// load
function loadData(){
name.value=localStorage.getItem("name")||"";
title.value=localStorage.getItem("title")||"";
about.value=localStorage.getItem("about")||"";
skills.value=localStorage.getItem("skills")||"";

name.dispatchEvent(new Event("input"));
title.dispatchEvent(new Event("input"));
about.dispatchEvent(new Event("input"));
skills.dispatchEvent(new Event("input"));
}

// pdf
function downloadPDF(){
html2pdf().from(resume).save();
}

// drag drop
let dragged;
document.addEventListener("dragstart",e=>dragged=e.target);
document.addEventListener("dragover",e=>e.preventDefault());
document.addEventListener("drop",e=>{
if(e.target.classList.contains("section")){
e.target.parentNode.insertBefore(dragged,e.target);
}
});

</script>

</body>
</html>
